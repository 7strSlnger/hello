<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Scott Slaten</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('metallica.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
        }
        
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 255, 0, 0.3);
        }
        
        h1 {
            color: #333;
            margin: 0 0 10px 0;
        }
        
        p {
            color: #666;
            margin: 0;
            font-size: 18px;
        }
        
        .company {
            color: #00ff00;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World</h1>
        <p>Scott Slaten</p>
        <p class="company">Metalhead | ServerLogic</p>
    </div>
</body>
</html>
