<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Scott Slaten</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #00ff00 0%, #000000 100%);
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            color: #333;
            margin: 0 0 10px 0;
        }
        
        p {
            color: #666;
            margin: 0;
            font-size: 18px;
        }
        
        .company {
            color: #00ff00;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .band-image {
            width: 250px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Metallica_-_Twickenham_Stadium_%281%29.jpg" alt="Metallica band" class="band-image">
        <h1>Hello World</h1>
        <p>Scott Slaten</p>
        <p class="company">Metalhead | ServerLogic</p>
    </div>
</body>
</html>
