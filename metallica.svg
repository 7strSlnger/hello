<svg width="250" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="250" height="250" fill="url(#metalGradient)"/>
  
  <!-- Metal spikes/horns (metalhead symbol) -->
  <polygon points="125,10 140,60 110,60" fill="#00ff00" stroke="#000" stroke-width="2"/>
  <polygon points="50,50 80,90 55,85" fill="#00ff00" stroke="#000" stroke-width="2"/>
  <polygon points="200,50 220,90 195,85" fill="#00ff00" stroke="#000" stroke-width="2"/>
  
  <!-- M (Metallica initial) -->
  <g transform="translate(60,100)">
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#00ff00" stroke="#000" stroke-width="2">M</text>
  </g>
  
  <!-- Lightning bolt (thrash metal symbol) -->
  <polygon points="170,120 185,140 175,155 190,170 160,130" fill="#00ff00" stroke="#000" stroke-width="2"/>
  
  <!-- Horns gesture (metalhead salute) -->
  <circle cx="80" cy="200" r="8" fill="#00ff00" stroke="#000" stroke-width="1"/>
  <circle cx="100" cy="190" r="8" fill="#00ff00" stroke="#000" stroke-width="1"/>
  <circle cx="150" cy="190" r="8" fill="#00ff00" stroke="#000" stroke-width="1"/>
  <circle cx="170" cy="200" r="8" fill="#00ff00" stroke="#000" stroke-width="1"/>
</svg>